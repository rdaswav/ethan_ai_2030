<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ETHAN — AI Transformation</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --ink:#1A1A1A;--black:#111;--paper:#fff;--paper-2:#F5F5F5;--paper-3:#EDEDED;
  --line:#DDDDDD;--grey-1:#595959;--grey-2:#4A4A4A;--grey-3:#333;--muted:#8C8C8C;
  --rail:260px;
  --mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
  --sans:Arial,'Helvetica Neue',Helvetica,sans-serif;
  --display:'Arial Black','Arial Bold',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.55;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--ink);color:#fff}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;width:100vw}
.rail{width:var(--rail);flex:0 0 var(--rail);background:var(--black);color:#fff;
      display:flex;flex-direction:column;height:100vh}
.rail-top{padding:28px 22px 18px}
.brand{font-family:var(--display);font-weight:900;font-size:20px;letter-spacing:.18em}
.brand-sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.26em;color:#7a7a7a;margin-top:6px;text-transform:uppercase}
.nav{flex:1;overflow-y:auto;padding:4px 0 16px}
.nav::-webkit-scrollbar{width:0}
.nav-item{display:flex;align-items:baseline;gap:12px;width:100%;text-align:left;
          padding:10px 22px;color:#8a8a8a;border-left:2px solid transparent;transition:.16s}
.nav-item:hover{color:#fff;background:#1c1c1c}
.nav-item.on{color:#fff;border-left-color:#fff;background:#181818}
.nav-num{font-family:var(--mono);font-size:10px;color:#555;flex:0 0 20px}
.nav-item.on .nav-num{color:#aaa}
.nav-label{font-size:12.5px;font-weight:700}
.rail-foot{padding:14px 22px;border-top:1px solid #242424;font-family:var(--mono);
           font-size:9.5px;letter-spacing:.1em;color:#5a5a5a;line-height:1.8}

/* ── STAGE ── */
.stage{flex:1;height:100vh;overflow-y:auto;background:var(--paper);position:relative}
.prog{position:sticky;top:0;height:3px;background:var(--paper-3);z-index:40}
.prog>i{display:block;height:100%;background:var(--ink);transition:width .4s cubic-bezier(.2,.7,.2,1)}
.wrap{max-width:1040px;margin:0 auto;padding:56px 64px 110px}
.view{animation:rise .38s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── TYPOGRAPHY ── */
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;
         color:var(--muted);display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:22px;height:1px;background:var(--ink)}
h1.sec{font-family:var(--display);font-weight:900;letter-spacing:-.03em;line-height:.94;
       font-size:clamp(36px,5vw,64px);margin:16px 0 0;text-transform:uppercase}
.lede{font-size:clamp(17px,1.9vw,22px);line-height:1.44;max-width:44ch;margin-top:24px;color:var(--ink)}
.lede b{font-weight:700}
p.body{font-size:15.5px;line-height:1.62;color:var(--grey-2);max-width:66ch;margin-top:14px}
p.body b{color:var(--ink);font-weight:700}
h2.sub{font-size:22px;font-weight:700;letter-spacing:-.01em;margin-top:36px}
h3.ssub{font-size:17px;font-weight:700;margin-top:24px}
.rule{height:1px;background:var(--line);margin:36px 0}

/* ── HERO ── */
.hero{height:100vh;min-height:580px;display:grid;
      grid-template-rows:auto 1fr auto;
      padding:0;background:var(--black);color:#fff;position:relative;overflow:hidden}
.hero-ey{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:#7a7a7a;
         text-transform:uppercase;padding:44px 56px 0}
.hero-main{display:flex;align-items:flex-end;overflow:hidden;padding:0 8px}
.hero h1{font-family:var(--display);font-weight:900;letter-spacing:-.04em;line-height:.88;
         font-size:clamp(60px,16vw,240px);text-transform:uppercase;margin:0}
/* bottom row: sub-copy left, 2030 right */
.hero-bottom{display:grid;grid-template-columns:1fr auto;align-items:flex-end;
             padding:32px 48px 48px 56px;gap:24px;border-top:1px solid #2a2a2a}
.hero-sub{font-size:clamp(14px,1.4vw,20px);line-height:1.45;max-width:32ch;
          font-weight:400;color:#b0b0b0;margin:0 0 24px}
.enter{display:inline-flex;align-items:center;gap:12px;background:#fff;
       color:#111;font-family:var(--mono);font-size:11px;letter-spacing:.16em;
       text-transform:uppercase;padding:13px 22px;font-weight:700;transition:.2s;white-space:nowrap}
.enter:hover{background:#e0e0e0}
.hero-yr{font-family:var(--display);font-weight:900;font-size:clamp(80px,13vw,200px);
         letter-spacing:-.04em;line-height:1;-webkit-text-stroke:2px #fff;
         color:transparent;text-transform:uppercase;white-space:nowrap;user-select:none}
.hero-foot{display:none}

/* ── CALLOUT ── */
.callout{margin-top:30px;background:var(--black);color:#fff;padding:26px 28px;border-left:4px solid #fff}
.callout p{font-size:16px;line-height:1.5;font-style:italic;color:#e8e8e8}
.callout p b{color:#fff;font-style:normal;font-weight:700}

/* ── STAT GRID ── */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);
       border:1px solid var(--line);margin-top:36px}
.stat{background:var(--paper);padding:24px 22px}
.stat .n{font-family:var(--display);font-weight:900;font-size:42px;letter-spacing:-.04em;line-height:1}
.stat .src{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--muted);
           text-transform:uppercase;margin-top:12px}
.stat .t{font-size:14px;color:var(--grey-2);margin-top:8px;line-height:1.5}
.stat .t b{color:var(--ink)}

/* ── OKR ── */
.okr-obj{margin-top:28px;border:1px solid var(--line)}
.okr-obj-hdr{background:var(--black);color:#fff;padding:16px 20px;display:flex;
             align-items:baseline;gap:14px}
.okr-obj-n{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#888}
.okr-obj-t{font-size:16px;font-weight:700}
.okr-kr{display:grid;grid-template-columns:1fr auto;border-top:1px solid var(--line);
        padding:14px 20px;align-items:start;gap:16px}
.okr-kr:nth-child(even){background:var(--paper-2)}
.okr-kr-t{font-size:14px;color:var(--grey-2);line-height:1.5}

/* ── RAG ── */
.rag-legend{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
.rag-leg{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;
         letter-spacing:.1em;text-transform:uppercase;color:var(--grey-1)}
.rag-dot{width:14px;height:14px;flex:0 0 14px}
.rd-a{background:var(--ink)}
.rd-p{background:repeating-linear-gradient(45deg,#555,#555 3px,#eee 3px,#eee 6px);border:1px solid #999}
.rd-m{border:2px solid var(--ink);background:transparent}
.rag-badge{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
           font-weight:700;padding:3px 8px;white-space:nowrap}
.rb-a{background:var(--ink);color:#fff}
.rb-p{background:var(--paper-3);color:var(--grey-1);border:1px solid #bbb}
.rb-m{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}

/* ── COMPARE TABLE ── */
.cmp{margin-top:36px;border:1px solid var(--line)}
.cmp-head-row{display:grid;grid-template-columns:190px 1fr 1fr;background:var(--black);color:#fff}
.cmp-head-row>div{padding:13px 18px;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
.cmp-row{display:grid;grid-template-columns:190px 1fr 1fr;border-top:1px solid var(--line)}
.cmp-row>div{padding:16px 18px;font-size:14px;line-height:1.5;border-left:1px solid var(--line)}
.cmp-row>div:first-child{border-left:none;font-weight:700;background:var(--paper-2);display:flex;align-items:center}
.cmp-today{color:var(--grey-1)}
.cmp-2030 b{font-weight:700}

/* ── TRANSFORMATION STATE ── */
.xform{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:30px}
.xform-col{border:1px solid var(--line);padding:20px}
.xform-col h3{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.xform-item{padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.5}
.xform-item:last-child{border-bottom:none}
.xform-item b{font-weight:700;display:block;color:var(--ink)}
.xform-item span{color:var(--grey-2)}

/* ── SUBTABS ── */
.subtabs{display:flex;flex-wrap:wrap;gap:1px;background:var(--line);border:1px solid var(--line);margin-top:30px}
.subtab{background:var(--paper);padding:12px 16px;flex:1;min-width:120px;text-align:left;transition:.15s}
.subtab .st-n{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--muted)}
.subtab .st-l{font-weight:700;font-size:12.5px;margin-top:4px}
.subtab:hover{background:var(--paper-2)}
.subtab.on{background:var(--ink);color:#fff}
.subtab.on .st-n{color:#aaa}
.pillar{margin-top:28px;animation:rise .3s ease}

/* ── TWO LEVERS ── */
.levers{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
.lever{border:1.5px solid var(--ink);padding:20px;display:flex;flex-direction:column}
.lever.locked{border-color:var(--line);background:repeating-linear-gradient(135deg,#fafafa,#fafafa 6px,#f0f0f0 6px,#f0f0f0 12px)}
.lever .lname{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.lever h3{font-size:18px;font-weight:700;margin-top:4px}
.lever p{font-size:13px;color:var(--grey-2);margin-top:10px;line-height:1.55;flex:1}
.lk{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
.toggle{margin-top:16px;display:flex;border:1.5px solid var(--ink);height:40px}
.toggle.dis{border-color:var(--line)}
.toggle button{flex:1;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;transition:.15s;color:var(--grey-1)}
.toggle button.act{background:var(--ink);color:#fff}
.toggle.dis button{cursor:not-allowed;color:var(--muted)}
.toggle.dis button.act{background:var(--grey-3);color:#fff}
.flow{margin-top:18px;border:1px solid var(--line);background:var(--paper-2)}
.flow-row{display:grid;grid-template-columns:1fr 1fr}
.bin{padding:18px 12px;text-align:center;border-right:1px solid var(--line)}
.bin:last-child{border-right:none}
.bin .bl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.bin .bv{font-family:var(--display);font-weight:900;font-size:28px;margin-top:6px;letter-spacing:-.03em;transition:.3s}
.bin .bn{font-size:11.5px;color:var(--grey-2);margin-top:4px}
.summ{margin-top:14px;font-size:14px;color:var(--ink);border-left:3px solid var(--ink);padding:4px 0 4px 14px;line-height:1.5}

/* ── MARGIN CHART ── */
.chartwrap{margin-top:8px;border:1px solid var(--line);padding:26px 22px 18px;background:var(--paper)}
.chart-legend{display:flex;gap:18px;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey-1);margin-bottom:16px;flex-wrap:wrap}
.chart-legend i{display:inline-block;width:12px;height:12px;margin-right:6px;vertical-align:-2px}
.lg-cost i{background:var(--paper-3);border:1px solid var(--grey-1)}
.lg-gp i{background:var(--ink)}
.stage-caption{margin-top:14px;font-size:13.5px;color:var(--grey-2);border-top:1px solid var(--line);padding-top:14px;line-height:1.55;min-height:50px}
.stage-caption b{color:var(--ink);font-weight:700}
.stagebtns{display:flex;gap:1px;background:var(--line);border:1px solid var(--line);margin-top:16px}
.stagebtns button{flex:1;background:var(--paper);padding:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--grey-1)}
.stagebtns button.on{background:var(--ink);color:#fff}

/* ── GOV ── */
.gov{display:flex;align-items:stretch;flex-wrap:wrap;gap:0;margin-top:8px}
.gnode{flex:1;min-width:140px;border:1.5px solid var(--line);padding:18px 16px;transition:.2s;text-align:left}
.gnode.on{border-color:var(--ink);background:var(--ink);color:#fff}
.gnode .gi{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--muted)}
.gnode.on .gi{color:#aaa}
.gnode h4{font-size:16px;font-weight:700;margin-top:5px}
.gnode p{font-size:12.5px;color:var(--grey-2);margin-top:8px;line-height:1.5}
.gnode.on p{color:#ccc}
.garrow{align-self:center;padding:0 10px;font-family:var(--mono);color:var(--muted);font-size:16px}
.revert{margin-top:14px;border:1px solid var(--ink);padding:12px 16px;font-size:13.5px;display:flex;gap:10px;align-items:baseline}
.revert .rk{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--ink);padding:3px 7px;white-space:nowrap}

/* ── LAYER STACK ── */
.stack{margin-top:8px;border:1px solid var(--line)}
.layer{display:flex;align-items:stretch;border-top:1px solid var(--line);transition:.16s;text-align:left;width:100%}
.layer:first-child{border-top:none}
.layer:hover{background:var(--paper-2)}
.layer.on{background:var(--ink);color:#fff}
.layer-k{flex:0 0 84px;padding:16px 18px;font-family:var(--display);font-weight:900;font-size:16px;letter-spacing:-.02em;border-right:1px solid var(--line);display:flex;align-items:center}
.layer.on .layer-k{border-right-color:#333}
.layer-b{padding:16px 20px;flex:1}
.layer-b .lt{font-weight:700;font-size:14.5px}
.layer-b .ld{font-size:13px;color:var(--grey-2);margin-top:5px;line-height:1.5;max-height:0;overflow:hidden;transition:.26s;opacity:0}
.layer.on .layer-b .ld{max-height:100px;opacity:1;margin-top:6px;color:#ccc}

/* ── DATA TABLE ── */
.dtable{margin-top:22px;border:1px solid var(--line);width:100%;border-collapse:collapse;font-size:13.5px}
.dtable th{background:var(--black);color:#fff;text-align:left;padding:12px 14px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:400}
.dtable td{padding:13px 14px;border-top:1px solid var(--line);color:var(--grey-2);line-height:1.5;vertical-align:top}
.dtable tr:nth-child(even) td{background:var(--paper-2)}
.dtable td b,.dtable td strong{color:var(--ink);font-weight:700}
.dtable td:first-child{font-weight:700;color:var(--ink)}

/* ── ARC ── */
.arc-bar{display:flex;margin-top:30px;border:1px solid var(--line)}
.arc-stop{flex:1;padding:16px;text-align:center;border-left:1px solid var(--line);transition:.18s}
.arc-stop:first-child{border-left:none}
.arc-stop:hover{background:var(--paper-2)}
.arc-stop.on{background:var(--ink);color:#fff}
.arc-stop .as-when{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.arc-stop.on .as-when{color:#bbb}
.arc-stop .as-dot{width:8px;height:8px;border-radius:50%;background:var(--line);margin:10px auto 0}
.arc-stop.on .as-dot{background:#fff}
.arc-panel{border:1px solid var(--line);border-top:none}
.arc-dim{display:grid;grid-template-columns:150px 1fr;border-top:1px solid var(--line)}
.arc-dim:first-child{border-top:none}
.arc-dim .ad-k{padding:14px 18px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;background:var(--paper-2);font-weight:700;display:flex;align-items:center}
.arc-dim .ad-v{padding:14px 18px;font-size:14px;color:var(--grey-2);line-height:1.5;border-left:1px solid var(--line)}

/* ── IMPERATIVES ── */
.imps{margin-top:26px;border-top:1px solid var(--line)}
.imp{display:flex;gap:22px;padding:20px 0;border-bottom:1px solid var(--line);align-items:baseline}
.imp .imp-n{font-family:var(--display);font-weight:900;font-size:28px;letter-spacing:-.04em;flex:0 0 38px;color:var(--ink)}
.imp .imp-b h3{font-size:17px;font-weight:700}
.imp .imp-b p{font-size:14px;color:var(--grey-2);margin-top:6px;line-height:1.55;max-width:72ch}

/* ── EXEC ── */
.phases{margin-top:24px;display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line)}
.phase{background:var(--paper);padding:20px 22px}
.phase .ph-h{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.phase .ph-n{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--ink);padding:3px 9px}
.phase h3{font-size:17px;font-weight:700}
.phase .ph-when{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
.phase p{font-size:13.5px;color:var(--grey-2);margin-top:10px;line-height:1.55;max-width:80ch}
.target{margin-top:10px;font-family:var(--mono);font-size:11.5px;color:var(--ink);border-top:1px dashed var(--line);padding-top:10px}

/* ── AGENT TOOL ── */
.agent-filter{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px;align-items:center}
.agent-filter-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.fchip{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
       padding:7px 14px;font-weight:700;border:1.5px solid var(--line);color:var(--grey-1);transition:.15s}
.fchip:hover{border-color:var(--ink);color:var(--ink)}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.fchip.h-now.on{background:#111;border-color:#111}
.fchip.h-near.on{background:#333;border-color:#333}
.fchip.h-long.on{background:#595959;border-color:#595959}
.domain-label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
              color:var(--muted);margin-top:28px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.domain-label::before{content:"";flex:1;height:1px;background:var(--line)}
.team-tabs{display:flex;flex-wrap:wrap;gap:1px;background:var(--line);border:1px solid var(--line)}
.team-tab{background:var(--paper);padding:10px 14px;flex:0 0 auto;text-align:left;transition:.14s}
.team-tab .tt-code{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--muted);font-weight:700}
.team-tab .tt-name{font-size:12.5px;font-weight:700;margin-top:3px}
.team-tab:hover{background:var(--paper-2)}
.team-tab.on{background:var(--ink);color:#fff}
.team-tab.on .tt-code{color:#aaa}
.team-panel{border:1px solid var(--line);border-top:none;padding:22px;animation:rise .28s ease}
.lens-section{margin-top:18px}
.lens-section:first-child{margin-top:0}
.lens-head{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
           font-weight:700;padding:6px 12px;display:inline-block;margin-bottom:10px}
.lh-cost{background:var(--black);color:#fff}
.lh-qual{background:var(--grey-3);color:#fff}
.lh-emp{background:var(--paper-3);color:var(--ink)}
.agent-item{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.5}
.agent-item:last-child{border-bottom:none}
.agent-item.hidden{display:none}
.h-badge{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
         padding:2px 7px;white-space:nowrap;flex:0 0 auto}
.hb-now{background:var(--ink);color:#fff}
.hb-near{background:var(--grey-3);color:#fff}
.hb-long{background:var(--paper-3);color:var(--ink);border:1px solid var(--line)}
.opp-box{margin-top:16px;border:1px solid var(--line);padding:14px 16px;background:var(--paper-2)}

.edit-bar button:hover{opacity:.85}

[contenteditable]:focus{background:rgba(255,255,255,.08);outline:1px dashed #888}
.edit-mode-on [contenteditable]{outline:1px dashed #bbb;min-width:1em}
.edit-mode-on .rail [contenteditable]:focus{outline:1px dashed #555}

/* ── NOTE LINE ── */
.note{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--muted);

.pager button.r{text-align:right;align-items:flex-end}
.pager .pg-k{font-size:9.5px;color:var(--muted)}

.mobtop{display:none}
@media(max-width:860px){

  .edit-bar{bottom:12px;right:12px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.rail :focus-visible,.hero :focus-visible{outline-color:#fff}

ctuals, not 2 days"},{"h":"near","text":"Resource utilisation forecast \u2014 8-week rolling view"}],"qual":[{"h":"near","text":"Scope drift detected in-flight \u2014 agent flags divergence from SOW before it\u2019s absorbed silently"},{"h":"near","text":"Transition governance \u2014 aged projects where NRC/MRC should have activated, escalated to commercial before revenue slips"},{"h":"near","text":"Change request prompt generated automatically when out-of-scope work is identified"}],"emp":[{"h":"now","text":"PMs stop building status reports from disconnected spreadsheets"},{"h":"near","text":"Scope conversations happen earlier \u2014 PMs aren\u2019t raising creep after months of silent absorption"},{"h":"near","text":"Project closure is clean \u2014 PIR done properly rather than never done at all"}]},"domain":"DELIVER"},{"code":"ENG","name":"Engineering \u0026 Technical Delivery","opportunity":"","lenses":{"cost":[{"h":"now","text":"As-built documentation generated from implementation notes and change records \u2014 engineers implement, agent documents"},{"h":"near","text":"HLD draft components generated from reference architectures \u2014 engineers refine, not start from blank"},{"h":"near","text":"Bill of materials generated from solution design \u2014 no manual catalogue lookup"},{"h":"near","text":"SOW estimates calibrated against comparable past projects"}],"qual":[{"h":"now","text":"PS scope and MS day-2 deliverables explicitly aligned in as-built outputs \u2014 MS team knows exactly what they\u2019re supporting from day one"},{"h":"near","text":"Design decisions logged consistently \u2014 what was considered, what was chosen, and why"},{"h":"near","text":"Technical risks surfaced during design, not discovered mid-delivery"},{"h":"near","text":"Reference architecture patterns applied consistently across engineers"}],"emp":[{"h":"now","text":"Senior engineers stop writing as-built docs for work already completed \u2014 agent does it from their notes"},{"h":"near","text":"Engineers work on design decisions that need them, not BOM lookups and boilerplate"},{"h":"near","text":"Cleaner handovers mean less blame when MS inherits a project"}]},"domain":"DELIVER"},{"code":"ADV","name":"Consulting \u0026 Advisory","opportunity":"","lenses":{"cost":[{"h":"now","text":"Advisory report and recommendation drafts generated from structured inputs"},{"h":"near","text":"Client maturity assessments partially automated \u2014 data gathering from existing sources, human interpretation retained"},{"h":"near","text":"Proposal content library maintained and surfaced automatically for relevant engagements"}],"qual":[{"h":"near","text":"AI readiness scoring produces consistent, comparable outputs across clients"},{"h":"near","text":"Recommendations linked to reference implementations and past outcomes"},{"h":"long","text":"Advisory insights aggregated across the client base \u2014 patterns surfaced as thought leadership"}],"emp":[{"h":"now","text":"Consultants spend time on insight and recommendation, not report assembly"},{"h":"near","text":"Consistent methodology applied even when different consultants run similar engagements"}]},"domain":"DELIVER"},{"code":"ARC","name":"Solution Architecture","opportunity":"","lenses":{"cost":[{"h":"now","text":"Reference architecture components surfaced automatically for relevant solution contexts"},{"h":"near","text":"Bill of materials and effort estimates generated from solution design inputs"},{"h":"near","text":"HLD draft sections generated from reference patterns \u2014 architect refines, not starts blank"}],"qual":[{"h":"near","text":"Design consistency enforced \u2014 deviations from reference patterns flagged for deliberate decision, not oversight"},{"h":"near","text":"Technical risk register populated from design decisions automatically"},{"h":"long","text":"Cross-client architecture patterns identified \u2014 reusable components catalogued and maintained"}],"emp":[{"h":"now","text":"Architects stop reconstructing known patterns from memory and prior documents"},{"h":"near","text":"Design reviews faster when context is assembled before the meeting, not during it"}]},"domain":"DELIVER"},{"code":"BID","name":"Pre-Sales \u0026 Bid","opportunity":"","lenses":{"cost":[{"h":"now","text":"Bid response sections drafted from structured inputs \u2014 BD reviews and refines"},{"h":"near","text":"Proposal library maintained and surfaced for relevant opportunities"},{"h":"near","text":"Competitor and market context assembled automatically for major bids"}],"qual":[{"h":"near","text":"Win/loss patterns analysed \u2014 common objections and winning themes surfaced"},{"h":"near","text":"Pricing consistency checked against past comparable deals before submission"},{"h":"long","text":"Bid quality scoring against RFP requirements \u2014 gaps flagged before submission"}],"emp":[{"h":"now","text":"Bid teams stop rebuilding boilerplate from scratch for every response"},{"h":"near","text":"More time on differentiation and client-specific content, less on template assembly"}]},"domain":"LEAD"}];

function DeliveryShift(){
  return (
    <div>
      <p className="body">The shift from labour-led to platform-led changes how we price and structure service — and opens a genuine choice architecture for customers.</p>
      <div className="levers">
        <div className="lever">
          <div className="lname">The shift</div>
          <h3>AI displacement</h3>
          <p>AI agents handle interactions that people used to carry. As resolution rates grow, the cost of delivering a given scope falls — and margin improves without changing what the customer pays.</p>
        </div>
        <div className="lever">
          <div className="lname">The opportunity</div>
          <h3>Service grade choice</h3>
          <p>AI creates a genuine tiering of service that didn't exist when everything was human-staffed. We can offer customers real options — different response profiles, coverage levels, and service grades at different price points — without compromising the quality ceiling.</p>
        </div>
      </div>
      <div className="summ">The goal is not to extract margin silently. It is to use AI to build a better, more flexible service — and to price that flexibility transparently. Customers get choice; ETHAN gets a structurally lower cost base underneath every tier.</div>

}

function MarginChart(){
  const [i,setI]=useState(1);
  const W=520,H=220,pad=30,bw=80,gap=(W-pad*2-bw*3)/2,maxV=230;
  const y=v=>H-pad-(v/maxV)*(H-pad*2);
  const gpPts=TRAJ.map((d,k)=>{const x=pad+k*(bw+gap)+bw/2;return[x,y(d.gp/100*maxV)];});
  return (
    <div>
      <p className="body">As AI takes volume, labour revenue falls. <b>This looks like decline. It is the goal.</b> Cost falls faster than revenue, so gross-profit dollars and margin grow.</p>
      <div className="chartwrap">
        <div className="chart-legend">
          <span className="lg-cost"><i></i>Cost to deliver</span>
          <span className="lg-gp"><i></i>Gross profit</span>
        </div>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" role="img">
          {[0,.25,.5,.75,1].map((t,k)=><line key={k} x1={pad} x2={W-pad} y1={pad+t*(H-pad*2)} y2={pad+t*(H-pad*2)} stroke="#EAEAEA"/>)}
          {TRAJ.map((d,k)=>{
            const x=pad+k*(bw+gap);
            const costH=(d.cost/maxV)*(H-pad*2);
            const gpH=(d.gp/100*d.rev/maxV)*(H-pad*2);
            const active=k===i;
            return <g key={k} style={{cursor:"pointer"}} onClick={()=>setI(k)} opacity={active?1:.5}>
              <rect x={x} y={H-pad-costH} width={bw} height={costH} fill="#EDEDED" stroke="#aaa"/>
              <rect x={x} y={H-pad-costH-gpH} width={bw} height={gpH} fill="#1A1A1A"/>
              <text x={x+bw/2} y={H-pad+16} textAnchor="middle" fontFamily="monospace" fontSize="10" fill={active?"#1A1A1A":"#aaa"}>{d.when}</text>
              <text x={x+bw/2} y={H-pad-costH-gpH-8} textAnchor="middle" fontFamily="Arial Black,Arial" fontWeight="900" fontSize="14" fill="#1A1A1A">{d.gp}%</text>
            </g>;
          })}
          <polyline points={gpPts.map(p=>p.join(",")).join(" ")} fill="none" stroke="#1A1A1A" strokeWidth="1.5" strokeDasharray="4 4"/>
          {gpPts.map((p,k)=><circle key={k} cx={p[0]} cy={p[1]} r={k===i?4:2.5} fill="#fff" stroke="#1A1A1A" strokeWidth="1.5"/>)}
        </svg>
        <div className="stagebtns">{TRAJ.map((d,k)=><button key={k} className={k===i?"on":""} onClick={()=>setI(k)}>{d.when}</button>)}</div>
        <div className="stage-caption">{TRAJ[i].cap}</div>
      </div>
    </div>
  );
}

function AgentRoadmap(){
  const [horizon,setHorizon]=useState("all");
  const [domain,setDomain]=useState("RUN");
  const [teamIdx,setTeamIdx]=useState(0);
  const domainTeams=AGENT_TEAMS.filter(t=>t.domain===domain);
  const team=domainTeams[Math.min(teamIdx,domainTeams.length-1)];
  const LENS_LABELS={"cost":"↓ Cost Out","qual":"↑ Quality","emp":"♦ Employee Satisfaction"};
  return (
    <div className="view">
      <SecHead num="06" kicker="By Team & Sub-Team" title="AI Agent Roadmap"/>
      <p className="lede">Where agents have the highest impact — across three lenses, three horizons, and every team in the division.</p>
      <div className="agent-filter">
        <span className="agent-filter-label">Horizon</span>
        {[["all","All"],["now","Now — Basic Agents"],["near","Near Term — Platform + Integrations"],["long","Long Term — Data Science / Lakes"]].map(([v,l])=>(
          <button key={v} className={`fchip h-${v}${horizon===v?" on":""}`} onClick={()=>setHorizon(v)}>{l}</button>
        ))}
      </div>
      <div className="agent-filter" style={{marginTop:12}}>
        <span className="agent-filter-label">Domain</span>
        {[["RUN","RUN — Managed Services"],["DELIVER","DELIVER — Professional Services"],["LEAD","LEAD — Pre-Sales"]].map(([v,l])=>(
          <button key={v} className={`fchip${domain===v?" on":""}`} onClick={()=>{setDomain(v);setTeamIdx(0);}}>{l}</button>
        ))}
      </div>
      <div className="team-tabs" style={{marginTop:22}}>
        {domainTeams.map((t,k)=>(
          <button key={k} className={"team-tab"+(k===Math.min(teamIdx,domainTeams.length-1)?" on":"")} onClick={()=>setTeamIdx(k)}>
            <div className="tt-code">{t.code}</div>
            <div className="tt-name">{t.name}</div>
          </button>
        ))}
      </div>
      {team && <div className="team-panel">
        {Object.entries(team.lenses).map(([lens,items])=>{
          const visible=items.filter(it=>horizon==="all"||it.h===horizon);
          if(!visible.length) return null;
          return (
            <div className="lens-section" key={lens}>
              <div className={`lens-head lh-${lens}`}>{LENS_LABELS[lens]}</div>
              {visible.map((it,k)=>(
                <div key={k} className="agent-item">
                  <span className={`h-badge hb-${it.h}`}>{it.h==="now"?"Now":it.h==="near"?"Near":"Long"}</span>
                  <span>{it.text}</span>
                </div>
              ))}
            </div>
          );
        })}
        {team.opportunity && <div className="opp-box"><div className="ok">The opportunity</div><p>{team.opportunity}</p></div>}
      </div>}
    </div>
  );
}

function simpleHash(str){
  let h=0;
  for(let i=0;i<str.length;i++){ h=Math.imul(31,h)+str.charCodeAt(i)|0; }
  return (h>>>0).toString(16).padStart(8,'0');
}

/* ═══════════════════════════════════════════════════════
   EDIT BAR + DOWNLOAD
   Strategy: edits stored in a module-level Map keyed by
   a data-eid attribute stamped onto each editable element.
   React re-renders restore from that Map so edits survive
   section navigation. Download bakes the Map into the HTML.
═══════════════════════════════════════════════════════ */

// Persistent store — lives outside React, survives re-renders
const EDIT_STORE = new Map(); // eid (stable text key) -> edited innerText
// Pre-populate from downloaded file's injected data (if any)
if(window.__SAVED_EDITS__){ window.__SAVED_EDITS__.forEach(([k,v])=>EDIT_STORE.set(k,v)); }
let eidCounter = 0;

function getOrCreateEid(el){
  if(!el.dataset.eid){
    // Use original text as stable key so it survives re-renders and fresh page loads.
    // Trim & collapse whitespace; fall back to counter for empty nodes.
    const text = el.innerText.trim().replace(/\s+/g,' ').slice(0,120);
    el.dataset.eid = text || ('__empty_'+(++eidCounter));
  }
  return el.dataset.eid;
}

const EDITABLE_SEL = [
  '.wrap p','.wrap h1','.wrap h2','.wrap h3','.wrap h4',
  '.wrap td','.wrap th','.wrap li',
  '.wrap .n','.wrap .t','.wrap .src','.wrap .lede','.wrap .summ',
  '.wrap .stage-caption','.wrap .target','.wrap .ad-v',
  '.wrap .imp-b p','.wrap .imp-b h3',
  '.wrap .okr-kr-t','.wrap .okr-obj-t',
  '.wrap .opp-box p','.wrap .agent-item > span:last-child',
  '.wrap .phase p','.wrap .phase h3','.wrap .ph-when',
  '.wrap .xform-item span','.wrap .xform-item b',
  '.wrap .hero-sub','.wrap .callout p',
].join(',');

function enableEditing(){
  document.body.classList.add('edit-mode-on');
  document.querySelectorAll(EDITABLE_SEL).forEach(el=>{
    const eid = getOrCreateEid(el);
    // idempotent: only wire up once per element instance
    if(el.contentEditable !== 'true'){
      el.contentEditable = 'true';
      el.addEventListener('input', onEditInput);
    }
    // restore saved edit (eid is original text so fresh DOM nodes resolve correctly)
    if(EDIT_STORE.has(eid)) el.innerText = EDIT_STORE.get(eid);
  });
}

function disableEditing(){
  document.body.classList.remove('edit-mode-on');
  document.querySelectorAll('[contenteditable]').forEach(el=>{
    if(el.dataset.eid) EDIT_STORE.set(el.dataset.eid, el.innerText);
    el.removeAttribute('contenteditable');
    el.removeEventListener('input', onEditInput);
  });
}

function onEditInput(e){
  const eid = e.target.dataset.eid;
  if(eid) EDIT_STORE.set(eid, e.target.innerText);
}

// Restore saved edits on any visible editable nodes (works in edit mode and in downloaded files).
// Uses EDITABLE_SEL so it stamps eids on fresh DOM nodes that don't have data-eid yet.
function restoreEdits(){
  if(!EDIT_STORE.size) return;
  document.querySelectorAll(EDITABLE_SEL).forEach(el=>{
    const eid = getOrCreateEid(el);
    const saved = EDIT_STORE.get(eid);
    if(saved !== undefined) el.innerText = saved;
  });
}

function EditBar({editMode, setEditMode}){
  // Re-apply editing to newly rendered DOM elements after every render (covers section navigation).
  useEffect(()=>{
    if(!editMode) return;
    const t = setTimeout(enableEditing, 0);
    return ()=>clearTimeout(t);
  }); // intentionally no dep array

  // Handle toggle: entering edit mode is covered by the effect above; leaving saves & cleans up.
  useEffect(()=>{ if(!editMode) disableEditing(); },[editMode]);

  const download = useCallback(()=>{
    // Flush any in-progress edits from currently visible contenteditable nodes
    document.querySelectorAll('[contenteditable]').forEach(el=>{
      if(el.dataset.eid) EDIT_STORE.set(el.dataset.eid, el.innerText);
    });

    // Inject edits as a preload global that EDIT_STORE initialises from on page load.
    // This runs before Babel/React so the store is populated before any render.
    const storeEntries = JSON.stringify([...EDIT_STORE.entries()]);
    const preloadScript = `<script id="__edits_preload__">window.__SAVED_EDITS__=${storeEntries};<\/script>`;

    const clone = document.documentElement.cloneNode(true);
    clone.querySelector('.edit-bar')?.remove();
    clone.querySelector('body')?.classList.remove('edit-mode-on');
    clone.querySelectorAll('[contenteditable]').forEach(el=>el.removeAttribute('contenteditable'));
    clone.querySelectorAll('[data-eid]').forEach(el=>el.removeAttribute('data-eid'));
    // Remove any previously injected preload script
    clone.querySelector('#__edits_preload__')?.remove();
    // Inject before the babel script so it runs first
    const babelScript = clone.querySelector('script[type="text/babel"]');
    if(babelScript) babelScript.insertAdjacentHTML('beforebegin', preloadScript);

    const out = '<!DOCTYPE html>\n' + clone.outerHTML;
    const blob = new Blob([out],{type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ETHAN_AI_Transformation_edited.html';
    a.click();
    URL.revokeObjectURL(a.href);
  },[]);

  return (
    <div className="edit-bar">
      <span className="eb-label">{editMode ? "Editing — click any text" : "Read only"}</span>
      <button onClick={()=>setEditMode(!editMode)}>
        {editMode ? "Done" : "Edit wording"}
      </button>
      {editMode && <button className="eb-dl" onClick={download}>↓ Download</button>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════ */
function App(){

  useEffect(()=>{
    if(!editMode && EDIT_STORE.size>0){
      const t=setTimeout(restoreEdits,0);
      return ()=>clearTimeout(t);
    }
  }); // intentionally no dep array
  useEffect(()=>{
    const h=e=>{
      if(view==="hero") return;
      if(e.key==="ArrowRight"&&idx<SECTIONS.length-1) setView(SECTIONS[idx+1].id);

        </div>

              <span className="nav-label">{s.label}</span>
            </button>
          ))}
        </nav>
        <div className="rail-foot">Strategy · FY26 · 2030<br/>← → to navigate</div>
      </aside>

      <div className="mobtop">
        <span className="brand">ETHAN</span>
        <span className="mt-sep"></span>
        {SECTIONS.map((s,k)=>(
          <button key={s.id} className={view===s.id?"on":""} onClick={()=>setView(s.id)}>{String(k+1).padStart(2,"0")} {s.label}</button>
        ))}
      </div>

      <main className="stage" ref={stageRef}>

            <button onClick={()=>idx>0&&setView(SECTIONS[idx-1].id)} disabled={idx===0}>
              <span className="pg-k">Previous</span>{idx>0?SECTIONS[idx-1].label:"—"}
            </button>
            <button className="r" onClick={()=>idx<SECTIONS.length-1&&setView(SECTIONS[idx+1].id)} disabled={idx===SECTIONS.length-1}>
              <span className="pg-k">Next</span>{idx<SECTIONS.length-1?SECTIONS[idx+1].label:"—"}
            </button>
          </div>
        </div>
      </main>

      <EditBar editMode={editMode} setEditMode={setEditMode}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
